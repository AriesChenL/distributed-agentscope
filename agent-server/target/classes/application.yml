server:
  port: 8080

spring:
  application:
    name: agent-server
  data:
    mongodb:
      uri: mongodb://localhost:27017/agentscope
      database: agentscope
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:agentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    root: INFO
    com.example.agent.server: DEBUG
    org.springframework.data.mongodb.core: DEBUG
