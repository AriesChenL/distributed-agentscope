version: '3.8'

services:
  # MongoDB - 用于消息存储
  mongodb:
    image: mongo:7
    container_name: agentscope-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: agentscope
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - agentscope-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # H2 Database (通过容器暴露)
  # H2 是内存数据库，运行在 agent-server 中
  
  # Agent Server
  agent-server:
    build:
      context: .
      dockerfile: Dockerfile-server
    container_name: agentscope-server
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_MONGODB_URI: mongodb://admin:admin123@mongodb:27017/agentscope?authSource=admin
      SPRING_DATASOURCE_URL: jdbc:h2:mem:agentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      SPRING_DATASOURCE_USERNAME: sa
      SPRING_DATASOURCE_PASSWORD:
      SERVER_PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - agentscope-network
    volumes:
      - ./logs/server:/app/logs

  # Agent Client
  agent-client:
    build:
      context: .
      dockerfile: Dockerfile-client
    container_name: agentscope-client
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      AGENT_SERVER_URL: http://agent-server:8080
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      - agent-server
    networks:
      - agentscope-network
    volumes:
      - ./logs/client:/app/logs

networks:
  agentscope-network:
    driver: bridge

volumes:
  mongodb_data:
